apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-root
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/keerthikhot/autonomous-sre-platform-EKS
    targetRevision: HEAD
    path: manifests/monitoring
  destination:
    server: https://kubernetes.default.svc
    # Default namespace for manifests that omit metadata.namespace. Child Application
    # resources set metadata.namespace: argocd explicitly.
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
