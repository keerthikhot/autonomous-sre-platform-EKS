apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/keerthikhot/autonomous-sre-platform-EKS.git
    targetRevision: HEAD
    path: k8s-manifests/monitoring
  destination:
    server: "https://kubernetes.default.svc"
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true